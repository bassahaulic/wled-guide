<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bassahaulic WLED Controller</title>
  <meta name="theme-color" content="#e21aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --accent: #e21aff;
      --blue: #0097ff;
      --green: #00ff66;
      --red: #ff3333;
      --text: #ffffff;
      --muted: #cccccc;
      --glass-bg: rgba(20, 20, 20, 0.55);
      --glass-border: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --radius-card: 12px;
      --radius-pill: 999px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html { background: var(--bg); }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #matrixCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    .app-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-brand {
      font-family: 'Audiowide', cursive;
      font-size: 1.15rem;
      color: var(--accent);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

    .gear-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted);
      font-size: 1.25rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .gear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Glass Card ── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
    }

    /* ── Connection Panel ── */
    .conn-panel {
      display: none;
      padding: 20px 16px;
      margin: 12px 16px;
      flex-direction: column;
      gap: 12px;
    }
    .conn-panel.open { display: flex; }

    .conn-panel input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-family: 'Roboto', system-ui, sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .conn-panel input[type="text"]:focus { border-color: var(--accent); }
    .conn-panel input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }

    .conn-btns { display: flex; gap: 10px; }

    .pill-btn {
      flex: 1;
      min-height: 44px;
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: var(--radius-pill);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      color: var(--text);
    }
    .pill-btn.magenta { border: 1px solid var(--accent); }
    .pill-btn.magenta:hover { background: var(--accent); color: #000; box-shadow: 0 0 16px rgba(226,26,255,0.4); }
    .pill-btn.blue { border: 1px solid var(--blue); }
    .pill-btn.blue:hover { background: var(--blue); color: #000; box-shadow: 0 0 16px rgba(0,151,255,0.4); }

    .conn-status {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }

    .scan-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .scan-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .scan-item:hover { border-color: var(--accent); }
    .scan-item-name { font-weight: 500; }
    .scan-item-ip { color: var(--muted); font-size: 0.85rem; font-family: monospace; }

    /* ── Welcome message ── */
    .welcome-msg {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .welcome-msg h2 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: var(--text);
    }

    /* ── LED Strip Preview ── */
    .led-strip-wrap {
      display: none;
      padding: 8px 16px 4px;
      text-align: center;
    }
    .led-strip-wrap.visible { display: block; }
    #ledStripCanvas {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 0 20px rgba(226, 26, 255, 0.15);
    }
    .led-strip-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      opacity: 0.4;
      margin-top: 4px;
    }
    .demo-badge {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffcc00;
      background: rgba(255, 204, 0, 0.12);
      border: 1px solid rgba(255, 204, 0, 0.3);
      padding: 3px 10px;
      border-radius: 999px;
      margin-left: 10px;
    }

    /* ── Main Controls ── */
    .main-controls {
      display: none;
      flex-direction: column;
      gap: 20px;
      padding: 16px;
      padding-bottom: calc(80px + var(--safe-bottom));
    }
    .main-controls.visible { display: flex; }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Power & Brightness ── */
    .power-bri-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .power-btn {
      width: 60px; height: 60px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, box-shadow 0.3s;
    }
    .power-btn.on {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 24px rgba(226,26,255,0.5), 0 0 48px rgba(226,26,255,0.2);
    }
    .power-btn:active { transform: scale(0.94); }

    .bri-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bri-label {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      min-width: 40px;
      text-align: right;
      color: var(--text);
    }

    /* ── Range Slider Base ── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      outline: none;
      background: #1a1a1a;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      box-shadow: 0 0 8px rgba(226,26,255,0.5);
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      box-shadow: 0 0 8px rgba(226,26,255,0.5);
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
    }
    input[type="range"]::-moz-range-track {
      height: 6px;
      border-radius: 3px;
      background: #1a1a1a;
    }

    /* Hue slider rainbow track */
    .hue-slider {
      background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) !important;
    }
    .hue-slider::-webkit-slider-thumb { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }
    .hue-slider::-moz-range-thumb { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }

    /* Saturation slider */
    .sat-slider::-webkit-slider-thumb { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.4); }
    .sat-slider::-moz-range-thumb { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.4); }

    /* ── Color Section ── */
    .color-section { padding: 16px; }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .slider-row label {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 32px;
    }
    .slider-row .val {
      min-width: 32px;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .quick-colors {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .qc {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .qc:hover { transform: scale(1.15); }
    .qc.active { border-color: var(--text); box-shadow: 0 0 8px rgba(255,255,255,0.3); }

    .color-preview-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .color-preview {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .color-preview-label {
      font-size: 0.85rem;
      color: var(--muted);
      font-family: monospace;
    }

    /* ── Effects Section ── */
    .effects-section { padding: 16px; }

    .fx-search {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      font-family: 'Roboto', system-ui, sans-serif;
    }
    .fx-search:focus { border-color: var(--accent); }
    .fx-search::placeholder { color: rgba(255,255,255,0.3); }

    .fx-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 14px;
      padding: 4px 0;
    }

    .fx-item {
      padding: 8px 14px;
      font-size: 0.8rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 36px;
      display: flex; align-items: center;
    }
    .fx-item:hover { border-color: var(--accent); }
    .fx-item.active {
      border-color: var(--accent);
      background: rgba(226,26,255,0.15);
      box-shadow: 0 0 10px rgba(226,26,255,0.25);
    }

    /* ── Palettes Section ── */
    .palettes-section { padding: 16px; }

    .pal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-height: 280px;
      overflow-y: auto;
    }

    .pal-item {
      padding: 8px 6px;
      font-size: 0.7rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .pal-item:hover { border-color: var(--blue); }
    .pal-item.active {
      border-color: var(--blue);
      background: rgba(0,151,255,0.15);
      box-shadow: 0 0 10px rgba(0,151,255,0.25);
    }

    /* ── Presets Section ── */
    .presets-section { padding: 16px; }

    .preset-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .preset-item {
      position: relative;
      padding: 10px 28px 10px 14px;
      font-size: 0.8rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      min-height: 40px;
      display: flex; align-items: center;
    }
    .preset-item:hover { border-color: var(--accent); }
    .preset-item.active {
      border-color: var(--accent);
      background: rgba(226,26,255,0.15);
    }

    .preset-del {
      position: absolute;
      top: -4px; right: -4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--red);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .preset-del:hover { opacity: 1; }

    .save-form {
      display: none;
      flex-direction: row;
      gap: 8px;
      align-items: center;
    }
    .save-form.open { display: flex; }

    .save-form input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .save-form input:focus { border-color: var(--accent); }

    .save-btn-row { display: flex; gap: 8px; margin-top: 10px; }

    /* ── Footer ── */
    .footer {
      margin-top: auto;
      text-align: center;
      padding: 20px 16px calc(16px + var(--safe-bottom));
      font-size: 0.8rem;
      color: var(--muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* ── Utility ── */
    .mb-8 { margin-bottom: 8px; }
  </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="app-wrap">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">BASSAHAULIC WLED</div>
    <div class="header-right">
      <div class="status-dot" id="statusDot"></div>
      <button class="gear-btn" id="gearBtn" aria-label="Connection settings">&#9881;</button>
    </div>
  </header>

  <!-- Connection Panel -->
  <div class="conn-panel glass" id="connPanel">
    <input type="text" id="ipInput" placeholder="192.168.1.x" autocomplete="off" inputmode="url">
    <div class="conn-btns">
      <button class="pill-btn magenta" id="connectBtn">Connect</button>
      <button class="pill-btn blue" id="scanBtn">Scan Network</button>
    </div>
    <div class="conn-status" id="connStatus"></div>
    <div class="scan-results" id="scanResults"></div>
  </div>

  <!-- Welcome -->
  <div id="welcomeMsg" class="welcome-msg">
    <h2>Connect to your WLED controller</h2>
    <p>Tap the gear icon and enter your device IP address</p>
    <div style="margin-top:24px;">
      <button class="pill-btn magenta" id="demoBtn" style="font-size:1rem; padding:14px 32px;">Try Demo Mode</button>
    </div>
    <p style="margin-top:10px; font-size:0.78rem; opacity:0.5;">No controller? Explore the app with a simulated device</p>
  </div>

  <!-- LED Strip Preview (visible in demo mode) -->
  <div class="led-strip-wrap" id="ledStripWrap">
    <canvas id="ledStripCanvas" height="20"></canvas>
    <div class="led-strip-label">SIMULATED LED STRIP</div>
  </div>

  <!-- Main Controls -->
  <div class="main-controls" id="mainControls">

    <!-- Power & Brightness -->
    <div class="glass" style="padding:16px">
      <div class="power-bri-row">
        <button class="power-btn" id="powerBtn">&#9211;</button>
        <div class="bri-wrap">
          <input type="range" id="briSlider" min="0" max="255" value="128">
          <span class="bri-label" id="briLabel">50%</span>
        </div>
      </div>
    </div>

    <!-- Color -->
    <div class="glass color-section">
      <div class="section-title">Color</div>
      <div class="slider-row">
        <label>Hue</label>
        <input type="range" class="hue-slider" id="hueSlider" min="0" max="360" value="0">
        <span class="val" id="hueVal">0</span>
      </div>
      <div class="slider-row">
        <label>Sat</label>
        <input type="range" class="sat-slider" id="satSlider" min="0" max="100" value="100">
        <span class="val" id="satVal">100</span>
      </div>
      <div class="quick-colors" id="quickColors">
        <div class="qc" style="background:#ff0000" data-r="255" data-g="0" data-b="0"></div>
        <div class="qc" style="background:#ff8800" data-r="255" data-g="136" data-b="0"></div>
        <div class="qc" style="background:#ffff00" data-r="255" data-g="255" data-b="0"></div>
        <div class="qc" style="background:#00ff00" data-r="0" data-g="255" data-b="0"></div>
        <div class="qc" style="background:#00ffff" data-r="0" data-g="255" data-b="255"></div>
        <div class="qc" style="background:#0000ff" data-r="0" data-g="0" data-b="255"></div>
        <div class="qc" style="background:#8800ff" data-r="136" data-g="0" data-b="255"></div>
        <div class="qc" style="background:#ffffff" data-r="255" data-g="255" data-b="255"></div>
      </div>
      <div class="color-preview-row">
        <div class="color-preview" id="colorPreview" style="background:#ff0000"></div>
        <span class="color-preview-label" id="colorLabel">rgb(255, 0, 0)</span>
      </div>
    </div>

    <!-- Effects -->
    <div class="glass effects-section">
      <div class="section-title">Effects</div>
      <input type="text" class="fx-search" id="fxSearch" placeholder="Search effects...">
      <div class="fx-list" id="fxList"></div>
      <div class="slider-row">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="0" max="255" value="128">
        <span class="val" id="speedVal">128</span>
      </div>
      <div class="slider-row">
        <label>Intns</label>
        <input type="range" id="intSlider" min="0" max="255" value="128">
        <span class="val" id="intVal">128</span>
      </div>
    </div>

    <!-- Palettes -->
    <div class="glass palettes-section">
      <div class="section-title">Palettes</div>
      <div class="pal-grid" id="palGrid"></div>
    </div>

    <!-- Presets -->
    <div class="glass presets-section">
      <div class="section-title">Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
      <div class="save-btn-row">
        <button class="pill-btn magenta" id="savePresetToggle" style="flex:none;padding:10px 20px">Save Current</button>
      </div>
      <div class="save-form" id="saveForm">
        <input type="text" id="presetNameInput" placeholder="Preset name">
        <button class="pill-btn magenta" style="flex:none;padding:10px 16px" id="savePresetBtn">Save</button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <a href="../index.html">Setup Guide</a> &middot; Bassahaulic
  </footer>

</div>

<script>
// ── Matrix Rain ──
(function() {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()_+-=[]{}|;:<>?/~';
  const fontSize = 14;
  let columns = Math.floor(canvas.width / fontSize);
  let drops = new Array(columns).fill(1);
  window.addEventListener('resize', () => { columns = Math.floor(canvas.width / fontSize); drops = new Array(columns).fill(1); });
  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff66';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(char, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Debounce ──
function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ── WLEDDevice ──
class WLEDDevice {
  constructor(ip) {
    this.ip = ip;
    this.ws = null;
    this.state = null;
    this.info = null;
    this.effects = [];
    this.palettes = [];
    this.presets = {};
    this.onStateUpdate = null;
    this.onConnect = null;
    this.onDisconnect = null;
    this._reconnectTimer = null;
    this._reconnectAttempts = 0;
  }

  async connect() {
    const res = await fetch(`http://${this.ip}/json`);
    const data = await res.json();
    this.state = data.state;
    this.info = data.info;
    this.effects = data.effects || [];
    this.palettes = data.palettes || [];
    try {
      const presRes = await fetch(`http://${this.ip}/presets.json`);
      this.presets = await presRes.json();
    } catch(e) { this.presets = {}; }
    this.connectWS();
    if (this.onConnect) this.onConnect();
  }

  connectWS() {
    if (this.ws) this.ws.close();
    this.ws = new WebSocket(`ws://${this.ip}/ws`);
    this.ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.state) { this.state = data.state; }
        if (data.info) { this.info = data.info; }
        if (this.onStateUpdate) this.onStateUpdate(this.state, this.info);
      } catch(err) {}
    };
    this.ws.onopen = () => { this._reconnectAttempts = 0; };
    this.ws.onclose = () => { this._tryReconnect(); if (this.onDisconnect) this.onDisconnect(); };
    this.ws.onerror = () => { this.ws.close(); };
  }

  _tryReconnect() {
    if (this._reconnectAttempts >= 10) return;
    this._reconnectAttempts++;
    clearTimeout(this._reconnectTimer);
    this._reconnectTimer = setTimeout(() => this.connectWS(), 3000);
  }

  async setState(partial) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify(partial));
    } else {
      await fetch(`http://${this.ip}/json/state`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(partial)
      });
    }
  }

  async savePreset(slot, name) {
    await this.setState({ psave: slot, n: name, ib: true, sb: true });
    try {
      const res = await fetch(`http://${this.ip}/presets.json`);
      this.presets = await res.json();
    } catch(e) {}
  }

  async deletePreset(slot) {
    await this.setState({ pdel: slot });
    try {
      const res = await fetch(`http://${this.ip}/presets.json`);
      this.presets = await res.json();
    } catch(e) {}
  }

  disconnect() {
    clearTimeout(this._reconnectTimer);
    if (this.ws) this.ws.close();
    this.ws = null;
  }
}

      if (preset) {
        if (preset.on !== undefined) this.state.on = preset.on;
        if (preset.bri !== undefined) this.state.bri = preset.bri;

          preset.seg.forEach((ps, i) => {
            if (this.state.seg[i]) Object.assign(this.state.seg[i], ps);
          });
        }
      }
    }
    if (partial.seg) {
      const segs = Array.isArray(partial.seg) ? partial.seg : [partial.seg];
      segs.forEach(s => {
        const idx = s.id || 0;
        if (!this.state.seg[idx]) return;
        if (s.col) this.state.seg[idx].col = s.col;
        if (s.fx !== undefined) this.state.seg[idx].fx = s.fx;
        if (s.sx !== undefined) this.state.seg[idx].sx = s.sx;
        if (s.ix !== undefined) this.state.seg[idx].ix = s.ix;
        if (s.pal !== undefined) this.state.seg[idx].pal = s.pal;
        if (s.on !== undefined) this.state.seg[idx].on = s.on;
        if (s.bri !== undefined) this.state.seg[idx].bri = s.bri;
      });
    }
    if (partial.psave !== undefined) {
      const slot = partial.psave;
      this.presets[String(slot)] = {
        n: partial.n || ('Preset ' + slot),
        on: this.state.on, bri: this.state.bri,
        seg: JSON.parse(JSON.stringify(this.state.seg))
      };
    }
    if (partial.pdel !== undefined) {
      delete this.presets[String(partial.pdel)];
    }
    // Trigger UI update
    if (this.onStateUpdate) this.onStateUpdate(this.state, this.info);
  }

  async savePreset(slot, name) {
    await this.setState({ psave: slot, n: name, ib: true, sb: true });
  }

  async deletePreset(slot) {
    await this.setState({ pdel: slot });
  }

  disconnect() {
    clearInterval(this._demoInterval);
  }
}

// ── LED Strip Renderer ──
const ledCanvas = document.getElementById('ledStripCanvas');
const ledCtx = ledCanvas ? ledCanvas.getContext('2d') : null;
let ledAnimFrame = 0;

function renderLEDStrip() {
  if (!ledCanvas || !ledCtx || !device || !device.state) return;
  const state = device.state;
  const seg = state.seg[0];
  const count = device.info ? device.info.leds.count : 30;
  const w = ledCanvas.parentElement.clientWidth - 32;
  ledCanvas.width = w;
  ledCanvas.height = 20;
  const ledW = Math.max(2, (w / count) - 1);
  const gap = 1;

  if (!state.on) {
    ledCtx.fillStyle = '#111';
    ledCtx.fillRect(0, 0, w, 20);
    ledCtx.fillStyle = '#333';
    ledCtx.font = '9px Orbitron, monospace';
    ledCtx.textAlign = 'center';
    ledCtx.fillText('OFF', w/2, 13);
    return;
  }

  const bri = state.bri / 255;
  const col = seg.col[0] || [255,255,255];
  const fx = seg.fx || 0;
  const speed = (seg.sx || 128) / 255;
  ledAnimFrame++;

  for (let i = 0; i < count; i++) {
    const x = i * (ledW + gap);
    let r = col[0], g = col[1], b = col[2];

    // Simulate a handful of popular effects
    if (fx === 0) {
      // Solid — just use the color as-is
    } else if (fx === 9 || fx === 10) {
      // Rainbow — shift hue per LED
      const hue = ((i * 12) + ledAnimFrame * speed * 2) % 360;
      [r, g, b] = ledHsvToRgb(hue, 100, 100);
    } else if (fx === 1) {
      // Blink
      const on = Math.sin(ledAnimFrame * speed * 0.1) > 0;
      if (!on) { r = 0; g = 0; b = 0; }
    } else if (fx === 2) {
      // Breathe
      const breath = (Math.sin(ledAnimFrame * speed * 0.04) + 1) / 2;
      r = Math.round(r * breath); g = Math.round(g * breath); b = Math.round(b * breath);
    } else if (fx === 17 || fx === 52) {
      // Twinkle / Fairytwinkle
      const twinkle = Math.random() > 0.85 ? 1 : 0.15;
      r = Math.round(r * twinkle); g = Math.round(g * twinkle); b = Math.round(b * twinkle);
    } else if (fx === 66) {
      // Fire 2012
      const heat = Math.max(0, Math.sin((i * 0.3) + ledAnimFrame * speed * 0.05) * 0.5 + 0.5 + (Math.random() * 0.2 - 0.1));
      r = Math.round(255 * heat); g = Math.round(80 * heat * heat); b = 0;
    } else if (fx === 29 || fx === 28) {
      // Chase
      const pos = Math.floor(ledAnimFrame * speed * 0.3) % count;
      const dist = Math.abs(i - pos);
      if (dist > 3) { r = Math.round(r * 0.08); g = Math.round(g * 0.08); b = Math.round(b * 0.08); }
    } else if (fx === 40) {
      // Scanner
      const scanPos = Math.floor((Math.sin(ledAnimFrame * speed * 0.03) + 1) / 2 * count);
      const dist = Math.abs(i - scanPos);
      const falloff = Math.max(0, 1 - dist / 4);
      r = Math.round(r * falloff); g = Math.round(g * falloff); b = Math.round(b * falloff);
    } else if (fx === 8) {
      // Colorloop
      const hue = ((ledAnimFrame * speed * 0.5) + i * 4) % 360;
      [r, g, b] = ledHsvToRgb(hue, 100, 100);
    } else if (fx === 20) {
      // Sparkle
      const spark = Math.random() > 0.92 ? 1 : 0.05;
      r = Math.round(r * spark); g = Math.round(g * spark); b = Math.round(b * spark);
    } else {
      // Generic effect — gentle wave
      const wave = (Math.sin((i * 0.4) + ledAnimFrame * speed * 0.06) + 1) / 2;
      r = Math.round(r * (0.3 + wave * 0.7));
      g = Math.round(g * (0.3 + wave * 0.7));
      b = Math.round(b * (0.3 + wave * 0.7));
    }

    // Apply brightness
    r = Math.round(r * bri); g = Math.round(g * bri); b = Math.round(b * bri);

    ledCtx.fillStyle = `rgb(${r},${g},${b})`;
    ledCtx.shadowColor = `rgb(${r},${g},${b})`;
    ledCtx.shadowBlur = 4;
    ledCtx.beginPath();
    ledCtx.roundRect(x, 2, ledW, 16, 2);
    ledCtx.fill();
  }
  ledCtx.shadowBlur = 0;
}

function ledHsvToRgb(h, s, v) {
  s /= 100; v /= 100;
  const c = v * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
}

// ── Color Helpers ──
function hsvToRgb(h, s, v) {
  h /= 360; s /= 100; v /= 100;
  let r, g, b;
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: r = v; g = t; b = p; break;
    case 1: r = q; g = v; b = p; break;
    case 2: r = p; g = v; b = t; break;
    case 3: r = p; g = q; b = v; break;
    case 4: r = t; g = p; b = v; break;
    case 5: r = v; g = p; b = q; break;
  }
  return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
}

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0, s = max === 0 ? 0 : d / max, v = max;
  if (d !== 0) {
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(v * 100)];
}

connectBtn.addEventListener('click', async () => {
  const ip = ipInput.value.trim();
  if (!ip) { connStatus.textContent = 'Enter an IP address'; return; }
  connStatus.textContent = 'Connecting...';
  connectBtn.disabled = true;
  try {
    if (device) device.disconnect();
    device = new WLEDDevice(ip);
    device.onConnect = () => {
      connected = true;
      localStorage.setItem('wled_ip', ip);
      statusDot.classList.add('connected');
      connStatus.textContent = `Connected to ${device.info ? device.info.name : ip}`;
      welcomeMsg.style.display = 'none';
      mainControls.classList.add('visible');
      connPanel.classList.remove('open');
      buildEffects();
      buildPalettes();
      buildPresets();
      updateUI(device.state);
    };
    device.onDisconnect = () => {
      statusDot.classList.remove('connected');
    };
    device.onStateUpdate = (state) => {
      updateUI(state);
    };
    await device.connect();
  } catch(err) {
    connStatus.textContent = 'Connection failed: ' + err.message;
    connected = false;
    statusDot.classList.remove('connected');

  connectBtn.disabled = false;
});

// ── Scan ──
scanBtn.addEventListener('click', async () => {
  const ip = ipInput.value.trim() || '192.168.1.1';
  const parts = ip.split('.');
  if (parts.length < 4) { connStatus.textContent = 'Enter a valid IP to detect subnet'; return; }
  const subnet = parts.slice(0, 3).join('.');
  connStatus.textContent = 'Scanning...';
  scanResults.innerHTML = '';
  scanBtn.disabled = true;

  // Scan in batches of 20 to avoid overwhelming browser/router
  const BATCH_SIZE = 20;
  for (let start = 1; start <= 254; start += BATCH_SIZE) {
    const batch = [];
    for (let i = start; i < start + BATCH_SIZE && i <= 254; i++) {
      const testIp = `${subnet}.${i}`;
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 1500);
      const p = fetch(`http://${testIp}/json/info`, { signal: controller.signal })
        .then(r => r.json())
        .then(info => {
          clearTimeout(timeout);
          const item = document.createElement('div');
          item.className = 'scan-item';
          item.innerHTML = `<span class="scan-item-name">${info.name || 'WLED'}</span><span class="scan-item-ip">${testIp}</span>`;
          item.addEventListener('click', () => {
            ipInput.value = testIp;
            connectBtn.click();
          });
          scanResults.appendChild(item);
        })
        .catch(() => { clearTimeout(timeout); });
      batch.push(p);
    }
    await Promise.allSettled(batch);
    connStatus.textContent = `Scanning... ${Math.min(start + BATCH_SIZE - 1, 254)}/254`;
  }
  scanBtn.disabled = false;
  if (!scanResults.children.length) {
    connStatus.textContent = 'No WLED devices found on ' + subnet + '.x';
  } else {
    connStatus.textContent = `Found ${scanResults.children.length} device(s)`;
  }
});

// ── Power ──
powerBtn.addEventListener('click', () => {
  if (!device) return;
  device.setState({ on: 't' });
  // Optimistic toggle
  if (device.state) {
    device.state.on = !device.state.on;
    updatePowerUI(device.state.on);
  }
});

function updatePowerUI(on) {
  powerBtn.classList.toggle('on', !!on);
}

// ── Brightness ──
const sendBri = debounce((val) => {
  if (device) device.setState({ bri: val });
}, 50);

briSlider.addEventListener('input', () => {
  const val = parseInt(briSlider.value);
  briLabel.textContent = Math.round(val / 255 * 100) + '%';
  updateSliderFill(briSlider, '#e21aff');
  sendBri(val);
});

// ── Hue ──
hueSlider.addEventListener('input', () => {
  currentHue = parseInt(hueSlider.value);
  hueVal.textContent = currentHue;
  updateColorPreview();
  updateSatSliderFill();
  const rgb = hsvToRgb(currentHue, currentSat, 100);
  sendColor(rgb[0], rgb[1], rgb[2]);
});

// ── Saturation ──
satSlider.addEventListener('input', () => {
  currentSat = parseInt(satSlider.value);
  satVal.textContent = currentSat;
  updateSatSliderFill();
  updateColorPreview();
  const rgb = hsvToRgb(currentHue, currentSat, 100);
  sendColor(rgb[0], rgb[1], rgb[2]);
});

// ── Quick Colors ──
document.querySelectorAll('.qc').forEach(el => {
  el.addEventListener('click', () => {
    const r = parseInt(el.dataset.r);
    const g = parseInt(el.dataset.g);
    const b = parseInt(el.dataset.b);
    document.querySelectorAll('.qc').forEach(q => q.classList.remove('active'));
    el.classList.add('active');
    const hsv = rgbToHsv(r, g, b);
    currentHue = hsv[0];
    currentSat = hsv[1];
    hueSlider.value = currentHue;
    satSlider.value = currentSat;
    hueVal.textContent = currentHue;
    satVal.textContent = currentSat;
    updateHueSliderFill();
    updateSatSliderFill();
    updateColorPreview();
    if (device) device.setState({ seg: [{ col: [[r, g, b]] }] });
  });
});

// ── Effects ──
function buildEffects() {
  if (!device) return;
  fxList.innerHTML = '';
  device.effects.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'fx-item';
    btn.textContent = name;
    btn.dataset.idx = idx;
    btn.addEventListener('click', () => {
      device.setState({ seg: [{ fx: idx }] });
      document.querySelectorAll('.fx-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    fxList.appendChild(btn);
  });
}

fxSearch.addEventListener('input', () => {
  const q = fxSearch.value.toLowerCase();
  document.querySelectorAll('.fx-item').forEach(btn => {
    btn.style.display = btn.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// Speed
const sendSpeed = debounce((val) => {
  if (device) device.setState({ seg: [{ sx: val }] });
}, 50);
speedSlider.addEventListener('input', () => {
  const val = parseInt(speedSlider.value);
  speedVal.textContent = val;
  updateSliderFill(speedSlider, '#e21aff');
  sendSpeed(val);
});

// Intensity
const sendInt = debounce((val) => {
  if (device) device.setState({ seg: [{ ix: val }] });
}, 50);
intSlider.addEventListener('input', () => {
  const val = parseInt(intSlider.value);
  intVal.textContent = val;
  updateSliderFill(intSlider, '#e21aff');
  sendInt(val);
});

// ── Palettes ──
function buildPalettes() {
  if (!device) return;
  palGrid.innerHTML = '';
  device.palettes.forEach((name, idx) => {
    const btn = document.createElement('button');
    btn.className = 'pal-item';
    btn.textContent = name;
    btn.dataset.idx = idx;
    btn.addEventListener('click', () => {
      device.setState({ seg: [{ pal: idx }] });
      document.querySelectorAll('.pal-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    palGrid.appendChild(btn);
  });
}

// ── Presets ──
function buildPresets() {
  if (!device) return;
  presetGrid.innerHTML = '';
  const presets = device.presets || {};
  Object.keys(presets).forEach(key => {
    const slot = parseInt(key);
    if (isNaN(slot) || slot < 1) return;
    const p = presets[key];
    const name = (p && p.n) ? p.n : `Preset ${slot}`;

    const item = document.createElement('div');
    item.className = 'preset-item';
    item.textContent = name;
    item.addEventListener('click', () => {
      device.setState({ ps: slot });
      document.querySelectorAll('.preset-item').forEach(b => b.classList.remove('active'));
      item.classList.add('active');
    });

    const del = document.createElement('button');
    del.className = 'preset-del';
    del.textContent = '\u00D7';
    del.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete preset "${name}"?`)) return;
      await device.deletePreset(slot);
      buildPresets();
    });
    item.appendChild(del);
    presetGrid.appendChild(item);
  });
}

savePresetToggle.addEventListener('click', () => {
  saveForm.classList.toggle('open');
  if (saveForm.classList.contains('open')) presetNameInput.focus();
});

savePresetBtn.addEventListener('click', async () => {
  const name = presetNameInput.value.trim();
  if (!name || !device) return;
  // Find next available slot
  let slot = 1;
  while (device.presets && device.presets[slot]) slot++;
  await device.savePreset(slot, name);
  presetNameInput.value = '';
  saveForm.classList.remove('open');
  buildPresets();
});

// ── Update UI from state ──
function updateUI(state) {
  if (!state) return;
  updatePowerUI(state.on);

  // Brightness
  briSlider.value = state.bri;
  briLabel.textContent = Math.round(state.bri / 255 * 100) + '%';
  updateSliderFill(briSlider, '#e21aff');

  const seg = state.seg && state.seg[0];
  if (!seg) return;

  // Color
  if (seg.col && seg.col[0]) {
    const [r, g, b] = seg.col[0];
    const hsv = rgbToHsv(r, g, b);
    currentHue = hsv[0];
    currentSat = hsv[1];
    hueSlider.value = currentHue;
    satSlider.value = currentSat;
    hueVal.textContent = currentHue;
    satVal.textContent = currentSat;
    colorPreview.style.background = `rgb(${r},${g},${b})`;
    colorLabel.textContent = `rgb(${r}, ${g}, ${b})`;
    updateHueSliderFill();
    updateSatSliderFill();
  }

  // Effect
  document.querySelectorAll('.fx-item').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.idx) === seg.fx);
  });

  // Speed / Intensity
  speedSlider.value = seg.sx;
  speedVal.textContent = seg.sx;
  updateSliderFill(speedSlider, '#e21aff');
  intSlider.value = seg.ix;
  intVal.textContent = seg.ix;
  updateSliderFill(intSlider, '#e21aff');

  // Palette
  document.querySelectorAll('.pal-item').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.idx) === seg.pal);
  });
}

// ── Demo Mode ──
const demoBtn = document.getElementById('demoBtn');
demoBtn.addEventListener('click', async () => {
  if (device) device.disconnect();
  stopLEDPreview();
  isDemo = true;
  device = new WLEDDemoDevice();
  device.onConnect = () => {
    connected = true;
    statusDot.classList.add('connected');
    // Add demo badge to header
    const existingBadge = document.querySelector('.demo-badge');
    if (!existingBadge) {
      const badge = document.createElement('span');
      badge.className = 'demo-badge';
      badge.textContent = 'DEMO';
      document.querySelector('.header-brand').after(badge);
    }
    connStatus.textContent = 'Demo Mode — simulated device';
    welcomeMsg.style.display = 'none';
    mainControls.classList.add('visible');
    connPanel.classList.remove('open');
    buildEffects();
    buildPalettes();
    buildPresets();
    updateUI(device.state);
    startLEDPreview();
  };
  device.onStateUpdate = (state, info) => {
    updateUI(state);
  };
  await device.connect();
});

// ── Init ──
(function init() {
  // Init slider fills
  updateSliderFill(briSlider, '#e21aff');
  updateHueSliderFill();
  updateSatSliderFill();
  updateSliderFill(speedSlider, '#e21aff');
  updateSliderFill(intSlider, '#e21aff');
  updateColorPreview();

  // Check for demo mode in URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('demo') === '1') {
    setTimeout(() => demoBtn.click(), 200);
    return;
  }

  // Restore last IP
  const savedIp = localStorage.getItem('wled_ip');
  if (savedIp) {
    ipInput.value = savedIp;
    // Auto-connect
    connPanel.classList.add('open');
    setTimeout(() => connectBtn.click(), 300);
  } else {
    connPanel.classList.add('open');
  }
})();

// ── Service Worker ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
